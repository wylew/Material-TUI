<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METUI | MD3 Expressive TUI Library</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

/* ============================================================
   METUI SHELL — index.html
   Handles: layout, sidebar, routing, theme engine
   Sections live in /sections/*.html and are loaded into #view-frame
   ============================================================ */

/* --- DESIGN TOKENS --- */
:root {
  --seed:       #cba6f7;
  --tonal-100:  var(--seed);
  --tonal-80:   color-mix(in srgb, var(--seed) 80%, #1e1e2e);
  --tonal-60:   color-mix(in srgb, var(--seed) 60%, #1e1e2e);
  --tonal-40:   color-mix(in srgb, var(--seed) 40%, #1e1e2e);
  --tonal-20:   color-mix(in srgb, var(--seed) 20%, #1e1e2e);
  --tonal-10:   color-mix(in srgb, var(--seed) 10%, #1e1e2e);

  --bg:         #1e1e2e;
  --surface:    #181825;
  --surface-2:  #313244;
  --outline:    #585b70;
  --outline-hi: #7f849c;

  --fg:         #cdd6f4;
  --fg-muted:   #a6adc8;
  --fg-subtle:  #585b70;

  --green:      #a6e3a1;
  --red:        #f38ba8;
  --yellow:     #f9e2af;
  --cyan:       #89dceb;

  --dur-fast:   100ms;
  --dur-std:    200ms;
  --ease-tui:   steps(4);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);

  --sp-xs: 4px;
  --sp-sm: 8px;
  --sp-md: 16px;
  --sp-lg: 24px;
  --sp-xl: 32px;

  --touch-target: 48px;
  --sidebar-width: 260px;
  --sidebar-collapsed: 56px;
}

/* --- RESET --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.6;
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* Scanline overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.07) 50%),
    linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
  background-size: 100% 3px, 3px 100%;
  pointer-events: none;
  z-index: 9999;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--surface);
  border-right: 2px solid var(--outline);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width var(--dur-std) var(--ease-smooth),
              min-width var(--dur-std) var(--ease-smooth);
  z-index: 100;
}

#sidebar.collapsed {
  width: var(--sidebar-collapsed);
  min-width: var(--sidebar-collapsed);
}

/* Logo bar */
.sidebar__logo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp-md);
  height: 56px;
  border-bottom: 2px solid var(--outline);
  flex-shrink: 0;
}

.sidebar__logo-text {
  color: var(--seed);
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--dur-std);
}

#sidebar.collapsed .sidebar__logo-text { opacity: 0; width: 0; }

.sidebar__toggle {
  background: none;
  border: 1px solid var(--outline);
  color: var(--fg-subtle);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color var(--dur-std), border-color var(--dur-std);
}
.sidebar__toggle:hover { color: var(--seed); border-color: var(--seed); }
.sidebar__toggle:focus-visible { outline: 2px solid var(--seed); outline-offset: 2px; }

/* Nav scroll area */
.sidebar__nav {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--outline) transparent;
}

/* Nav group */
.nav-group {
  border-bottom: 1px solid var(--surface-2);
  padding: var(--sp-sm) 0;
}

.nav-group__label {
  padding: var(--sp-xs) var(--sp-md);
  font-size: 0.6rem;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 2px;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--dur-std);
}
#sidebar.collapsed .nav-group__label { opacity: 0; }

/* Nav item */
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  padding: 0 var(--sp-md);
  height: var(--touch-target);
  cursor: pointer;
  color: var(--fg-muted);
  text-decoration: none;
  font-size: 0.82rem;
  white-space: nowrap;
  overflow: hidden;
  transition: background var(--dur-fast) var(--ease-tui),
              color var(--dur-fast) var(--ease-tui);
  border: none;
  background: none;
  font-family: 'JetBrains Mono', monospace;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--surface-2); color: var(--seed); }
.nav-item:focus-visible { outline: 2px solid var(--seed); outline-offset: -2px; }

.nav-item.active {
  background: var(--tonal-20);
  color: var(--seed);
  font-weight: 700;
  border-left: 3px solid var(--seed);
}

.nav-item__glyph {
  flex-shrink: 0;
  width: 20px;
  text-align: center;
  font-size: 0.9rem;
  color: var(--fg-subtle);
  transition: color var(--dur-fast);
}
.nav-item:hover .nav-item__glyph,
.nav-item.active .nav-item__glyph { color: var(--seed); }

.nav-item__label {
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity var(--dur-std);
}
#sidebar.collapsed .nav-item__label { opacity: 0; width: 0; overflow: hidden; }

/* Sidebar footer: theme controls */
.sidebar__footer {
  border-top: 1px solid var(--surface-2);
  padding: var(--sp-md);
  flex-shrink: 0;
}

.sidebar__footer-label {
  font-size: 0.6rem;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: var(--sp-sm);
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--dur-std);
}
#sidebar.collapsed .sidebar__footer-label { opacity: 0; }

.theme-swatches {
  display: flex;
  gap: var(--sp-xs);
  flex-wrap: wrap;
  transition: opacity var(--dur-std);
}
#sidebar.collapsed .theme-swatches { opacity: 0; pointer-events: none; }

.theme-swatch {
  width: 24px;
  height: 24px;
  border: 2px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform var(--dur-fast) var(--ease-tui), border-color var(--dur-std);
}
.theme-swatch:hover { transform: scale(1.2); }
.theme-swatch:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }
.theme-swatch.active { border-color: var(--fg); }

.seed-row {
  display: flex;
  align-items: center;
  gap: var(--sp-sm);
  margin-top: var(--sp-sm);
  transition: opacity var(--dur-std);
}
#sidebar.collapsed .seed-row { opacity: 0; pointer-events: none; }

.seed-row label {
  font-size: 0.6rem;
  color: var(--fg-subtle);
  text-transform: uppercase;
  white-space: nowrap;
}

#seedPicker {
  width: 28px;
  height: 28px;
  border: 1px solid var(--outline);
  background: none;
  cursor: pointer;
  padding: 2px;
}

/* ============================================================
   MAIN CONTENT AREA
   ============================================================ */
#shell-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Topbar */
#topbar {
  height: 56px;
  border-bottom: 2px solid var(--outline);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-xl);
  gap: var(--sp-md);
  background: var(--surface);
  flex-shrink: 0;
}

#topbar-breadcrumb {
  font-size: 0.75rem;
  color: var(--fg-subtle);
  display: flex;
  align-items: center;
  gap: var(--sp-xs);
}
#topbar-breadcrumb .crumb-active {
  color: var(--seed);
  font-weight: 700;
}
#topbar-breadcrumb .sep { color: var(--outline); margin: 0 2px; }

#topbar-status {
  margin-left: auto;
  font-size: 0.65rem;
  color: var(--yellow);
  border: 1px solid var(--yellow);
  padding: 2px var(--sp-sm);
  white-space: nowrap;
}

/* Section iframe */
#view-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: var(--bg);
  display: block;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(0);
    transition: transform var(--dur-std) var(--ease-smooth);
    z-index: 200;
  }
  #sidebar.mobile-hidden {
    transform: translateX(-100%);
  }
  #mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
  }
  #sidebar:not(.mobile-hidden) ~ #mobile-overlay { display: block; }
}

@media (min-width: 641px) {
  #mobile-overlay { display: none !important; }
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar" role="navigation" aria-label="Main navigation">

  <div class="sidebar__logo">
    <span class="sidebar__logo-text">METUI_v2.0</span>
    <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle sidebar" title="Toggle sidebar">«</button>
  </div>

  <nav class="sidebar__nav">

    <div class="nav-group">
      <div class="nav-group__label">Core</div>
      <button class="nav-item active" data-section="00-overview" onclick="route(this)">
        <span class="nav-item__glyph">#</span>
        <span class="nav-item__label">00_OVERVIEW</span>
      </button>
      <button class="nav-item" data-section="01-tokens" onclick="route(this)">
        <span class="nav-item__glyph">$</span>
        <span class="nav-item__label">01_DESIGN_TOKENS</span>
      </button>
    </div>

    <div class="nav-group">
      <div class="nav-group__label">Components (MD3)</div>
      <button class="nav-item" data-section="02-actions" onclick="route(this)">
        <span class="nav-item__glyph">!</span>
        <span class="nav-item__label">02_ACTIONS</span>
      </button>
      <button class="nav-item" data-section="03-navigation" onclick="route(this)">
        <span class="nav-item__glyph">^</span>
        <span class="nav-item__label">03_NAVIGATION</span>
      </button>
      <button class="nav-item" data-section="04-selection" onclick="route(this)">
        <span class="nav-item__glyph">*</span>
        <span class="nav-item__label">04_SELECTION</span>
      </button>
      <button class="nav-item" data-section="05-containment" onclick="route(this)">
        <span class="nav-item__glyph">[]</span>
        <span class="nav-item__label">05_CONTAINMENT</span>
      </button>
      <button class="nav-item" data-section="06-inputs" onclick="route(this)">
        <span class="nav-item__glyph">></span>
        <span class="nav-item__label">06_INPUT_FIELDS</span>
      </button>
      <button class="nav-item" data-section="07-typography" onclick="route(this)">
        <span class="nav-item__glyph">T</span>
        <span class="nav-item__label">07_TYPOGRAPHY</span>
      </button>
      <button class="nav-item" data-section="08-overlays" onclick="route(this)">
        <span class="nav-item__glyph">@</span>
        <span class="nav-item__label">08_OVERLAYS</span>
      </button>
      <button class="nav-item" data-section="09-data" onclick="route(this)">
        <span class="nav-item__glyph">D</span>
        <span class="nav-item__label">09_DATA_DISPLAY</span>
      </button>
    </div>

    <div class="nav-group">
      <div class="nav-group__label">System</div>
      <button class="nav-item" data-section="10-theme" onclick="route(this)">
        <span class="nav-item__glyph">%</span>
        <span class="nav-item__label">10_THEME_ADVANCED</span>
      </button>
      <button class="nav-item" data-section="11-best-practices" onclick="route(this)">
        <span class="nav-item__glyph">?</span>
        <span class="nav-item__label">11_BEST_PRACTICES</span>
      </button>
    </div>

  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__footer-label">System_Theme</div>
    <div class="theme-swatches" role="group" aria-label="Theme presets">
      <button class="theme-swatch active" style="background:#cba6f7" title="Catppuccin Mocha"
              onclick="setSeed('#cba6f7', this)" aria-label="Catppuccin Mocha"></button>
      <button class="theme-swatch" style="background:#bd93f9" title="Dracula"
              onclick="setSeed('#bd93f9', this)" aria-label="Dracula"></button>
      <button class="theme-swatch" style="background:#89b4fa" title="Blue"
              onclick="setSeed('#89b4fa', this)" aria-label="Blue"></button>
      <button class="theme-swatch" style="background:#89dceb" title="Cyan"
              onclick="setSeed('#89dceb', this)" aria-label="Cyan"></button>
      <button class="theme-swatch" style="background:#a6e3a1" title="Green"
              onclick="setSeed('#a6e3a1', this)" aria-label="Green"></button>
      <button class="theme-swatch" style="background:#f38ba8" title="Red"
              onclick="setSeed('#f38ba8', this)" aria-label="Red"></button>
    </div>
    <div class="seed-row">
      <label for="seedPicker">Custom</label>
      <input type="color" id="seedPicker" value="#cba6f7"
             oninput="setSeedFromPicker(this.value)" aria-label="Custom seed color">
    </div>
  </div>

</aside>

<!-- Mobile backdrop -->
<div id="mobile-overlay" onclick="closeMobileSidebar()" aria-hidden="true"></div>

<!-- MAIN -->
<div id="shell-main">

  <header id="topbar" role="banner">
    <div id="topbar-breadcrumb" aria-label="Current location">
      <span>metui</span>
      <span class="sep">/</span>
      <span id="crumb-section" class="crumb-active">00_OVERVIEW</span>
    </div>
    <div id="topbar-status" aria-live="polite">STATUS: 0x00_READY</div>
  </header>

  <iframe
    id="view-frame"
    src="sections/00-overview.html"
    title="Section content"
    aria-label="Section content"
  ></iframe>

</div>

<script>
  // ---- ROUTING ----
  const sectionLabels = {
    '00-overview':      '00_OVERVIEW',
    '01-tokens':        '01_DESIGN_TOKENS',
    '02-actions':       '02_ACTIONS',
    '03-navigation':    '03_NAVIGATION',
    '04-selection':     '04_SELECTION',
    '05-containment':   '05_CONTAINMENT',
    '06-inputs':        '06_INPUT_FIELDS',
    '07-typography':    '07_TYPOGRAPHY',
    '08-overlays':      '08_OVERLAYS',
    '09-data':          '09_DATA_DISPLAY',
    '10-theme':         '10_THEME_ADVANCED',
    '11-best-practices':'11_BEST_PRACTICES',
  };

  function route(btn) {
    const section = btn.dataset.section;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-frame').src = `sections/${section}.html`;
    document.getElementById('crumb-section').textContent = sectionLabels[section] || section;
    // close mobile sidebar
    if (window.innerWidth <= 640) closeMobileSidebar();
  }

  // ---- THEME ENGINE ----
  // Broadcast theme to iframe on load and on change
  const frame = document.getElementById('view-frame');

  function broadcastTheme() {
    try {
      const style = getComputedStyle(document.documentElement);
      const vars = [
        '--seed','--tonal-100','--tonal-80','--tonal-60',
        '--tonal-40','--tonal-20','--tonal-10',
        '--bg','--surface','--surface-2','--outline','--outline-hi',
        '--fg','--fg-muted','--fg-subtle',
        '--green','--red','--yellow','--cyan',
        '--dur-fast','--dur-std','--ease-tui','--ease-smooth',
        '--sp-xs','--sp-sm','--sp-md','--sp-lg','--sp-xl',
        '--touch-target'
      ];
      const theme = {};
      vars.forEach(v => { theme[v] = style.getPropertyValue(v).trim(); });
      frame.contentWindow.postMessage({ type: 'METUI_THEME', theme }, '*');
    } catch(e) {}
  }

  frame.addEventListener('load', broadcastTheme);

  function setSeed(color, btn) {
    document.documentElement.style.setProperty('--seed', color);
    document.getElementById('seedPicker').value = color;
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    if (btn) btn.classList.add('active');
    broadcastTheme();
  }

  function setSeedFromPicker(color) {
    document.documentElement.style.setProperty('--seed', color);
    document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
    broadcastTheme();
  }

  // ---- SIDEBAR TOGGLE ----
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('sidebarToggle');
  let collapsed = false;

  toggleBtn.addEventListener('click', () => {
    collapsed = !collapsed;
    sidebar.classList.toggle('collapsed', collapsed);
    toggleBtn.textContent = collapsed ? '»' : '«';
    toggleBtn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
  });

  // ---- MOBILE SIDEBAR ----
  function closeMobileSidebar() {
    sidebar.classList.add('mobile-hidden');
  }
  // On mobile, sidebar starts hidden — add a hamburger via topbar
  if (window.innerWidth <= 640) {
    sidebar.classList.add('mobile-hidden');
    const ham = document.createElement('button');
    ham.textContent = '≡';
    ham.className = 'sidebar__toggle';
    ham.style.marginRight = 'auto';
    ham.setAttribute('aria-label', 'Open navigation');
    ham.onclick = () => sidebar.classList.remove('mobile-hidden');
    document.getElementById('topbar').prepend(ham);
  }
</script>
</body>
</html>
